apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onepassword-connect
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-996"
spec:
  source:
    repoURL: https://github.com/ehakan/homelab.git
    targetRevision: HEAD
    path: kubernetes/apps/cluster-secrets/onepassword-connect/base
  destination:
    server: https://kubernetes.default.svc
    namespace: onepassword
  project: "default"


