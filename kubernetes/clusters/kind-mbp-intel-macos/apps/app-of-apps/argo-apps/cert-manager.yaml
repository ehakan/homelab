apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-994"
spec:
  source:
    repoURL: https://github.com/ehakan/homelab.git
    targetRevision: HEAD
    path: kubernetes/apps/cluster-traffic/cert-manager/overlays/with-gateway-support
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  project: "default"


