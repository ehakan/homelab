apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster

name: kind-mbp-intel-macos

networking:
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6443

kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      certSANs:
        - "100.67.55.100"
        - "mbp-intel-macos"
    
nodes:
  - role: control-plane
    image: kindest/node:v1.27.1@sha256:b7d12ed662b873bd8510879c1846e87c7e676a79fefc93e17b2a52989d3ff42b
    extraPortMappings:
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      - containerPort: 30443
        hostPort: 443
        protocol: TCP
