apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cf-letsencrypt-ehakan-dev
spec:
  acme:
    email: ehakangencoglu@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: cf-letsencrypt-ehakan-dev-acme
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cf-ehakan-dev-dns-creds
              key: api-token