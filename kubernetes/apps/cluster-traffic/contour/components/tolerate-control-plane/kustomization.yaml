apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Daemonset
      name: envoy
    patch: |
      - op: add
        path: /spec/template/spec/tolerations/-
        value:
          key: node-role.kubernetes.io/control-plane
          operator: Equal
          effect: NoSchedule
      - op: add
        path: /spec/template/spec/tolerations/-
        value:
          key: node-role.kubernetes.io/master
          operator: Equal
          effect: NoSchedule
