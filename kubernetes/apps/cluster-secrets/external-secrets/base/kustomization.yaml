apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml

helmCharts:
  - name: external-secrets
    releaseName: external-secrets
    repo: https://charts.external-secrets.io
    namespace: external-secrets
    version: 0.9.0
    includeCRDs: true
    valuesInline:
      installCRDs: true
